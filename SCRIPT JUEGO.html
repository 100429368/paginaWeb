<script>
        // --- VARIABLES ---
        const filas = 4;
        const columnas = 6;
        let segundos = 0;
        let intervalo; 

        // Jugador ESTÁ EN POSICIÓN 0,0
        const jugador = Array.from({ length: 4 }, () => [false]);
        jugador[0][0] = true; 

        // Matriz del juego 
        const matriz = Array.from({ length: filas }, () => 
            Array.from({ length: columnas }, () => false)
        );

        // Llenamos la última columna para la prueba
        for (let i = 0; i < filas; i++) {
            matriz[i][5] = true;
        }

        // --- INICIO DEL JUEGO ---
        // Eliminamos el 'while'. El intervalo es el que "manda".
        intervalo = setInterval(() => {
            segundos++;
            actualizaMtx();
            
            console.clear();
            console.log(`Tiempo: ${segundos}s`);
            console.table(matriz);

            if (compruebaFinJuego()) {
                finalizaJuego();
            }
        }, 1000);

        // --- FUNCIONES ---
        function actualizaMtx() {
            // Movemos todo a la izquierda
            for (let i = 0; i < filas; i++) {
                for (let j = 0; j < columnas - 1; j++) {
                    matriz[i][j] = matriz[i][j + 1];
                }
                matriz[i][columnas - 1] = Math.round(Math.random());
            }
        }

        function compruebaFinJuego() { 
            // Devuelve true si la esquina superior izquierda es true
            return matriz[0][0] === true;
        }

        function finalizaJuego() {
            clearInterval(intervalo); 
            console.log("RIP");
        }
    </script>
